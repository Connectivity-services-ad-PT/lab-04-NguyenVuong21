name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # ĐÃ GỠ BỎ cache: "npm" ĐỂ TRÁNH LỖI ĐỒNG BỘ CỨNG LOCK FILE

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps # ĐÃ ĐỔI TỪ npm ci THÀNH LỆNH CÀI NỚI LỎNG PHIÊN BẢN

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: docker build -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container
        run: |
          docker run -d --rm \
            --name fit4110-iot-lab04 \
            -p 8000:8000 \
            --env AUTH_TOKEN=local-dev-token \
            fit4110/iot-ingestion:lab04

      - name: Wait for service health
        run: npx wait-on http://localhost:8000/health --timeout 30000

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: docker logs fit4110-iot-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-iot-lab04 || true

      - name: Upload Newman reports
        if: always()
        run: |
          mkdir -p reports
          uses: actions/upload-artifact@v4
          with:
            name: lab04-newman-reports
            path: reports/